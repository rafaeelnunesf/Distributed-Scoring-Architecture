services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  scoring-worker:
    build: ./scoring-worker
    ports: ["8001:8001"]
    environment:
      - PORT=8001
    depends_on:
      - mongodb
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["3000:3000"]
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/carrier-assure
      - REDIS_URL=redis://redis:6379
      - SCORING_SERVICE_URL=http://scoring-worker:8001
      - JWT_SECRET=changeme-in-production
      - JWT_REFRESH_SECRET=changeme-refresh-in-production
      - PORT=3000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      scoring-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:3000/api/v1/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports: ["3001:3001"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:3001/login',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
